name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref so PR pushes don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Convex URL — accepted as long as it's well-formed; not contacted at build time.
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          # Clerk validates publishable-key format at build time. The string below
          # is a valid-format-but-non-functional dev key (base64 of a fake
          # frontend-api domain). Replace via repo secrets if a real key is needed.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhjaXRpbmctcG9ueS03OS5jbGVyay5hY2NvdW50cy5kZXYk
          CLERK_SECRET_KEY: sk_test_placeholder
          CLERK_JWT_ISSUER_DOMAIN: https://placeholder.clerk.accounts.dev
          CLERK_WEBHOOK_SECRET: whsec_placeholder
